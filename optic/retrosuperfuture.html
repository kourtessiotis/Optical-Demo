<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrosuperfuture | Psinakis Optical Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; font-family: 'Inter', sans-serif; color: #eeeeee; margin: 0; }
        .serif-font { font-family: 'Playfair Display', serif; }
        .gold-accent { color: #D4AF37; }
    </style>
</head>
<body>
<nav class="sticky top-0 z-50 bg-black/90 backdrop-blur-sm border-b border-gray-800 px-6 py-4 text-white">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-widest uppercase">Psinakis <span class="gold-accent">Optical Store</span></h1>
            <div class="hidden md:flex space-x-8 text-sm uppercase tracking-wider">
                <a href="index.html" class="hover:text-[#D4AF37] transition">Home</a>
                <a href="arnette.html" class="hover:text-[#D4AF37] transition">Arnette</a>
                <a href="retrosuperfuture.html" class="gold-accent underline underline-offset-8">Retrosuperfuture</a>
                <a href="order.html" class="hover:text-[#D4AF37] transition">Order</a>
                <a href="contact.html" class="hover:text-[#D4AF37] transition">Contact</a>
            </div>
        </div>
    </nav>
    <header class="py-16 text-center text-white">
        <h2 class="text-5xl serif-font mb-2 uppercase tracking-widest">Retrosuperfuture</h2>
        <div class="w-20 h-1 bg-[#D4AF37] mx-auto mt-4"></div>
    </header>
    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 text-white">
            <div class="group">
                <div class="border border-gray-800 overflow-hidden"><img src="S1.jpg" class="w-full h-[400px] object-cover transition transform group-hover:scale-105"></div>
                <div class="mt-4 text-center">
                    <h3 class="text-sm uppercase text-gray-400">RETROSUPERFUTURE Roma Black</h3>
                    <p class="gold-accent text-lg font-bold">249.99 €</p>
                    <a href="order.html" class="inline-block mt-4 px-6 py-2 border border-[#D4AF37] text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black transition text-[10px] font-bold uppercase tracking-widest">
                        Order Now
                    </a>
                </div>
            </div>
            <div class="group">
                <div class="border border-gray-800 overflow-hidden"><img src="S2.jpg" class="w-full h-[400px] object-cover transition transform group-hover:scale-105"></div>
                <div class="mt-4 text-center">
                    <h3 class="text-xs uppercase text-gray-400">RETROSUPERFUTURE Caro Black with Blue Lenses</h3>
                    <p class="gold-accent text-lg font-bold">159.99 €</p>
                    <a href="order.html" class="inline-block mt-4 px-6 py-2 border border-[#D4AF37] text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black transition text-[10px] font-bold uppercase tracking-widest">
                        Order Now
                    </a>
                </div>
            </div>
            <div class="group">
                <div class="border border-gray-800 overflow-hidden"><img src="S4.jpg" class="w-full h-[400px] object-cover transition transform group-hover:scale-105"></div>
                <div class="mt-4 text-center">
                    <h3 class="text-sm uppercase text-gray-400">RETROSUPERFUTURE Fred 2.0 3627</h3>
                    <p class="gold-accent text-lg font-bold">199.99 €</p>
                    <a href="order.html" class="inline-block mt-4 px-6 py-2 border border-[#D4AF37] text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black transition text-[10px] font-bold uppercase tracking-widest">
                        Order Now
                    </a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
