<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psinakis Optical | Premium Sunglasses</title>
    
    <meta name="description" content="Ανακαλύψτε την premium συλλογή γυαλιών ηλίου στο Psinakis Optical. Επίσημος μεταπωλητής Arnette, Retrosuperfuture και Michael Kors.">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" defer></script>
    
    <style>
        body { background-color: #000; color: #fff; }
        .gold-accent { color: #D4AF37; }
        .hover-gold:hover { color: #D4AF37; }
    </style>
</head>
<body class="font-sans antialiased">

    <nav class="p-6 border-b border-gray-800 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-widest uppercase">
            PSINAKIS <span class="gold-accent">OPTICAL</span>
        </div>
        <div class="hidden md:flex space-x-6 text-sm uppercase tracking-wide">
            <a href="index.html" class="gold-accent">Home</a>
            <a href="arnette.html" class="hover-gold transition">Arnette</a>
            <a href="retrosuperfuture.html" class="hover-gold transition">RetroSuperFuture</a>
            <a href="contact.html" class="hover-gold transition">Contact</a>
        </div>
    </nav>

    <header class="text-center py-20 px-4">
        <h1 class="text-4xl md:text-6xl font-light uppercase tracking-widest mb-4">Discover Your <br><span class="font-bold gold-accent">Perfect Vision</span></h1>
        <p class="text-gray-400 max-w-xl mx-auto text-sm md:text-base">Premium eyewear collection. Handpicked sunglasses for every style.</p>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <h2 class="text-2xl uppercase tracking-widest text-center mb-12 border-b border-gray-800 pb-4 inline-block">New Arrivals</h2>
        
        <div id="random-products" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <p class="text-center text-gray-400 col-span-full">Φόρτωση συλλογής...</p>
        </div>
    </main>

    <footer class="border-t border-gray-800 py-8 text-center mt-12">
        <p class="text-xs text-gray-400 uppercase tracking-widest">&copy; 2026 Psinakis Optical. All rights reserved.</p>
    </footer>

    <script>
        const initialProducts = [
            { name: "RETROSUPERFUTURE Roma Black", price: "249.99 €", img: "S1.jpg", id: "roma" },
            { name: "RETROSUPERFUTURE Caro Black with Blue Lenses", price: "159.99 €", img: "S2.jpg", id: "caro" },
            { name: "MICHAEL KORS MK2259U", price: "139.99 €", img: "S3.jpg", id: "kors" },
            { name: "RETROSUPERFUTURE Fred 2.0 3627", price: "199.99 €", img: "S4.jpg", id: "fred" },
            { name: "ARNETTE 7201 BIG BAD", price: "69.99 €", img: "S5.jpg", id: "arnette_big" },
            { name: "Arnette Black", price: "69.99 €", img: "S6.jpg", id: "arnette_black" }
        ];

        async function displayAllProducts() {
            const container = document.getElementById('random-products');
            if (!container) return; 

            let allProducts = [...initialProducts];

            try {
                const response = await fetch('/data/products.json');
                if (response.ok) {
                    const data = await response.json();
                    if (data && Array.isArray(data.items)) {
                        allProducts = [...allProducts, ...data.items];
                    }
                }
            } catch (e) {
                console.log("Δεν βρέθηκαν νέα προϊόντα από το Admin Panel ακόμα.");
            }

            const shuffled = allProducts.sort(() => 0.5 - Math.random());

            container.innerHTML = '';
            shuffled.forEach(p => {
                const imageSrc = p.img || "S1.jpg";
                const productName = p.name || "Νέο Μοντέλο";
                
                container.innerHTML += `
                    <div class="group">
                        <div class="border border-gray-800 overflow-hidden">
                            <img src="${imageSrc}" alt="${productName}" class="w-full h-[400px] object-cover transition transform group-hover:scale-105">
                        </div>
                        <div class="mt-4 text-center">
                            <h3 class="text-sm uppercase text-gray-300">${productName}</h3>
                            <p class="gold-accent font-semibold">${p.price || "Ρωτήστε Τιμή"}</p>
                            <a href="product.html?model=${p.id}" class="inline-block mt-4 px-6 py-2 border border-[#D4AF37] text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black transition text-[10px] font-bold uppercase tracking-widest">
                                Order Now
                            </a>
                        </div>
                    </div>`;
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            displayAllProducts(); 

            if (window.netlifyIdentity) {
                window.netlifyIdentity.on("init", user => {
                    if (!user) {
                        window.netlifyIdentity.on("login", () => {
                            document.location.href = "/admin/";
                        });
                    }
                });
            }
        });
    </script>
</body>
</html>
